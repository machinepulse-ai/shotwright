# Shotwright Platform — Docker Compose
# All services run as Windows containers on Windows Server LTSC 2025.
#
# K8s migration notes:
#   - Each service maps 1:1 to a Deployment + Service.
#   - `mongo` becomes a StatefulSet with a PersistentVolumeClaim.
#   - Named volumes become PVCs.
#   - Environment variables migrate to ConfigMaps / Secrets.
#   - Labels below follow the app.kubernetes.io convention for easy Helm generation.

services:
  # ---------- MongoDB ----------
  mongo:
    image: mongo:7-windowsservercore-ltsc2025
    # If the official Windows mongo image is unavailable, build one from:
    #   https://github.com/docker-library/mongo (Windows Dockerfiles)
    # or use the community-maintained variant.
    container_name: shotwright-mongo
    isolation: process
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:C:/data/db
    environment:
      MONGO_INITDB_DATABASE: shotwright
    labels:
      app.kubernetes.io/name: mongo
      app.kubernetes.io/component: database
      app.kubernetes.io/part-of: shotwright

  # ---------- Backend API ----------
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: backend
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        CHOCO_SOURCE: ${CHOCO_SOURCE:-}
    container_name: shotwright-api
    isolation: process
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SHOTWRIGHT_MONGO_URI: mongodb://mongo:27017
      SHOTWRIGHT_MONGO_DB: shotwright
      SHOTWRIGHT_SECRET_KEY: ${SHOTWRIGHT_SECRET_KEY:-change-me-in-production}
      SHOTWRIGHT_ADMIN_PASSWORD: ${SHOTWRIGHT_ADMIN_PASSWORD:-admin}
      SHOTWRIGHT_AGENT_PROVIDER: ${SHOTWRIGHT_AGENT_PROVIDER:-copilot}
      SHOTWRIGHT_GITHUB_TOKEN: ${SHOTWRIGHT_GITHUB_TOKEN:-}
      SHOTWRIGHT_COPILOT_MODEL: ${SHOTWRIGHT_COPILOT_MODEL:-gpt-5.4}
      SHOTWRIGHT_OPENAI_API_KEY: ${SHOTWRIGHT_OPENAI_API_KEY:-}
      SHOTWRIGHT_CODEX_HOME: ${SHOTWRIGHT_CODEX_HOME:-}
      SHOTWRIGHT_CODEX_MODEL: ${SHOTWRIGHT_CODEX_MODEL:-gpt-5.4}
      SHOTWRIGHT_CODEX_REASONING_EFFORT: ${SHOTWRIGHT_CODEX_REASONING_EFFORT:-high}
      SHOTWRIGHT_CODEX_TURN_TIMEOUT_SECONDS: ${SHOTWRIGHT_CODEX_TURN_TIMEOUT_SECONDS:-900}
      SHOTWRIGHT_DOCKER_HOST: npipe:////./pipe/docker_engine
      SHOTWRIGHT_SHOTWRIGHT_IMAGE: ${SHOTWRIGHT_SHOTWRIGHT_IMAGE:-shotwright:runtime}
      SHOTWRIGHT_CONTAINER_ISOLATION: ${SHOTWRIGHT_CONTAINER_ISOLATION:-process}
      SHOTWRIGHT_PYTHON_TOOL_AUTO_SYNC_DEPENDENCIES: ${SHOTWRIGHT_PYTHON_TOOL_AUTO_SYNC_DEPENDENCIES:-true}
      SHOTWRIGHT_PYTHON_TOOL_RUNTIME_DIR: C:\data\python
      SHOTWRIGHT_PYTHON_TOOL_REQUIREMENTS: C:\workspace\src\backend-config\requirements-aigc.txt
    volumes:
      - uploads:C:/data/uploads
      - exports:C:/data/exports
      - hls:C:/data/hls
      - python-runtime:C:/data/python
      - ./backend:C:/workspace/src/backend-config:ro
      # Mount host Docker named pipe so the backend can manage AE containers
      - type: npipe
        source: \\.\pipe\docker_engine
        target: \\.\pipe\docker_engine
    depends_on:
      - mongo
    labels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
      app.kubernetes.io/part-of: shotwright

  # ---------- Frontend ----------
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
      target: frontend
      args:
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
        CHOCO_SOURCE: ${CHOCO_SOURCE:-}
    container_name: shotwright-ui
    isolation: process
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      SHOTWRIGHT_API_PROXY_TARGET: http://backend:8000
    labels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/component: ui
      app.kubernetes.io/part-of: shotwright

volumes:
  mongo-data:
    name: shotwright_mongo_data
    labels:
      app.kubernetes.io/name: mongo-data
      app.kubernetes.io/part-of: shotwright
  uploads:
    name: shotwright_uploads
    labels:
      app.kubernetes.io/part-of: shotwright
  exports:
    name: shotwright_exports
    labels:
      app.kubernetes.io/part-of: shotwright
  hls:
    name: shotwright_hls
    labels:
      app.kubernetes.io/part-of: shotwright
  python-runtime:
    name: shotwright_python_runtime
    labels:
      app.kubernetes.io/part-of: shotwright
