name: windows-container-validation

on:
  push:
    paths:
      - .dockerignore
      - .github/workflows/windows-container-validation.yml
      - Dockerfile
      - keepalive.ps1
      - package.json
      - scripts/**
  pull_request:
    paths:
      - .dockerignore
      - .github/workflows/windows-container-validation.yml
      - Dockerfile
      - keepalive.ps1
      - package.json
      - scripts/**
  workflow_dispatch:

jobs:
  dockerfile-build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Verify Windows container mode
        shell: pwsh
        run: |
          $osType = docker info --format '{{.OSType}}'
          if ($osType.Trim() -ne 'windows') {
            throw "Expected Docker Windows container mode but got '$osType'."
          }

      - name: Build Shotwright image
        shell: pwsh
        run: |
          docker build -t shotwright:ci .
          docker image inspect shotwright:ci --format '{{.Id}}'

  validation-render:
    needs: dockerfile-build
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-2025
    env:
      SHOTWRIGHT_INSTALLER_CACHE_URL: ${{ secrets.SHOTWRIGHT_INSTALLER_CACHE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Require private installer cache
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SHOTWRIGHT_INSTALLER_CACHE_URL)) {
            throw 'Set the SHOTWRIGHT_INSTALLER_CACHE_URL secret to a private zip that expands to payload/AEFT_26.2_win64 and payload/CreativeCloudHelper_win64.'
          }

      - name: Download installer cache
        shell: pwsh
        run: |
          $cacheRoot = Join-Path $env:RUNNER_TEMP 'shotwright-installer-cache'
          $zipPath = Join-Path $cacheRoot 'installer-cache.zip'
          New-Item -ItemType Directory -Force -Path $cacheRoot | Out-Null
          Invoke-WebRequest -Uri $env:SHOTWRIGHT_INSTALLER_CACHE_URL -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $cacheRoot -Force

          if (Test-Path (Join-Path $cacheRoot 'payload\AEFT_26.2_win64')) {
            $payloadRoot = Join-Path $cacheRoot 'payload'
          } elseif (Test-Path (Join-Path $cacheRoot 'AEFT_26.2_win64')) {
            $payloadRoot = $cacheRoot
          } else {
            throw 'Installer cache zip must contain payload/AEFT_26.2_win64 and payload/CreativeCloudHelper_win64, or place both directories at the archive root.'
          }

          if (-not (Test-Path (Join-Path $payloadRoot 'CreativeCloudHelper_win64'))) {
            throw 'CreativeCloudHelper_win64 was not found in the installer cache.'
          }

          "SHOTWRIGHT_PAYLOAD_ROOT=$payloadRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Shotwright image
        shell: pwsh
        run: |
          docker build -t shotwright:ci .

      - name: Install After Effects and render validation mp4
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\validate\run_validation.ps1 `
            -ImageTag shotwright:ci `
            -AfterEffectsPayloadRoot (Join-Path $env:SHOTWRIGHT_PAYLOAD_ROOT 'AEFT_26.2_win64') `
            -CreativeCloudHelperRoot (Join-Path $env:SHOTWRIGHT_PAYLOAD_ROOT 'CreativeCloudHelper_win64')

      - name: Validate mp4 with ffprobe
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:GITHUB_WORKSPACE 'validation-data\output'
          $outputFile = Join-Path $outputDir 'validation.mp4'
          if (-not (Test-Path $outputFile)) {
            throw 'validation.mp4 was not produced.'
          }

          $probeOutput = docker run --rm -v "${outputDir}:C:\output" shotwright:ci powershell -NoProfile -Command "ffprobe -v error -show_entries format=format_name,duration -of default=noprint_wrappers=1 'C:\output\validation.mp4'"
          if ($probeOutput -notmatch 'format_name=.*mp4' -or $probeOutput -notmatch 'duration=') {
            throw "ffprobe did not report a valid mp4 container.`n$probeOutput"
          }