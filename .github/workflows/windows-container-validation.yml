name: windows-container-validation

on:
  push:
    paths:
      - Dockerfile
  pull_request:
    paths:
      - Dockerfile
  workflow_dispatch:

jobs:
  dockerfile-build:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Verify Windows container mode
        shell: pwsh
        run: |
          $osType = docker info --format '{{.OSType}}'
          if ($osType.Trim() -ne 'windows') {
            throw "Expected Docker Windows container mode but got '$osType'."
          }

      - name: Build Shotwright image
        shell: pwsh
        run: |
          docker build -t shotwright:ci .
          docker image inspect shotwright:ci --format '{{.Id}}'

  validation-render:
    needs: dockerfile-build
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-2025
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Parse setup versions
        id: versions
        shell: pwsh
        run: |
          $json = python scripts/install/setup_versions.py
          $parsed = $json | ConvertFrom-Json
          "current=$($parsed.current)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "platform=$($parsed.platform)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "payload_dir_name=$($parsed.payload_dir_name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "helper_dir_name=$($parsed.helper_dir_name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ghcr_image=$($parsed.ghcr_image)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Login to GHCR
        shell: pwsh
        run: |
          '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Pull setup image from GHCR
        shell: pwsh
        run: |
          $imageTag = '${{ steps.versions.outputs.ghcr_image }}'
          docker pull $imageTag
          "SETUP_IMAGE=$imageTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Extract installer payload from setup image
        shell: pwsh
        run: |
          $payloadRoot = Join-Path $env:RUNNER_TEMP 'ae-payload'
          docker create --name ae-setup-extract $env:SETUP_IMAGE cmd /c exit
          docker cp 'ae-setup-extract:C:\payload' $payloadRoot
          docker rm ae-setup-extract
          "SHOTWRIGHT_PAYLOAD_ROOT=$payloadRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Shotwright image
        shell: pwsh
        run: |
          docker build -t shotwright:ci .

      - name: Install After Effects and render validation mp4
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\validate\run_validation.ps1 `
            -ImageTag shotwright:ci `
            -AfterEffectsPayloadRoot (Join-Path $env:SHOTWRIGHT_PAYLOAD_ROOT '${{ steps.versions.outputs.payload_dir_name }}') `
            -CreativeCloudHelperRoot (Join-Path $env:SHOTWRIGHT_PAYLOAD_ROOT '${{ steps.versions.outputs.helper_dir_name }}')

      - name: Validate mp4 with ffprobe
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:GITHUB_WORKSPACE 'validation-data\output'
          $outputFile = Join-Path $outputDir 'validation.mp4'
          if (-not (Test-Path $outputFile)) {
            throw 'validation.mp4 was not produced.'
          }

          $probeOutput = docker run --rm -v "${outputDir}:C:\output" shotwright:ci powershell -NoProfile -Command "ffprobe -v error -show_entries format=format_name,duration -of default=noprint_wrappers=1 'C:\output\validation.mp4'"
          if ($probeOutput -notmatch 'format_name=.*mp4' -or $probeOutput -notmatch 'duration=') {
            throw "ffprobe did not report a valid mp4 container.`n$probeOutput"
          }