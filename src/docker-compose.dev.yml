# Shotwright Platform — Development Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Enables:
#   - Single dev container based on shotwright:runtime
#   - After Effects 26.2 preinstalled in the runtime base image
#   - Backend hot reload via uvicorn --reload with source mount
#   - Frontend webpack-dev-server with HMR via source mount

services:
  backend:
    profiles: ["split-services"]

  frontend:
    profiles: ["split-services"]

  dev:
    image: shotwright-dev:latest
    build:
      context: ..
      dockerfile: src/Dockerfile.dev
      args:
        DEV_BASE_IMAGE: ${SHOTWRIGHT_DEV_BASE_IMAGE:-shotwright:runtime}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.aliyun.com}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    container_name: shotwright-dev
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      SHOTWRIGHT_MONGO_URI: mongodb://mongo:27017
      SHOTWRIGHT_MONGO_DB: shotwright
      SHOTWRIGHT_SECRET_KEY: ${SHOTWRIGHT_SECRET_KEY:-change-me-in-production}
      SHOTWRIGHT_ADMIN_PASSWORD: ${SHOTWRIGHT_ADMIN_PASSWORD:-admin}
      SHOTWRIGHT_GITHUB_TOKEN: ${SHOTWRIGHT_GITHUB_TOKEN:-}
      SHOTWRIGHT_COPILOT_MODEL: ${SHOTWRIGHT_COPILOT_MODEL:-gpt-5.4}
      SHOTWRIGHT_DOCKER_HOST: npipe:////./pipe/docker_engine
      SHOTWRIGHT_SHOTWRIGHT_IMAGE: ${SHOTWRIGHT_SHOTWRIGHT_IMAGE:-shotwright:runtime}
      SHOTWRIGHT_CONTAINER_PAYLOAD_MOUNT_AUTO_DETECT: "false"
      SHOTWRIGHT_CONTAINER_PAYLOAD_MOUNT_SOURCE: ${SHOTWRIGHT_CONTAINER_PAYLOAD_MOUNT_SOURCE:-}
      SHOTWRIGHT_DEBUG: "true"
      SHOTWRIGHT_API_PROXY_TARGET: http://127.0.0.1:8000
      PYTHONPATH: C:/workspace/src/backend
    volumes:
      - ./backend/app:C:/workspace/src/backend/app
      - ./frontend:C:/workspace/src/frontend
      - frontend-node-modules:C:/workspace/src/frontend/node_modules
      - ../.github:C:/workspace/.github
      - ./scripts:C:/workspace/src/scripts
      - uploads:C:/data/uploads
      - exports:C:/data/exports
      - hls:C:/data/hls
      - type: npipe
        source: \\.\pipe\docker_engine
        target: \\.\pipe\docker_engine

volumes:
  frontend-node-modules:
  uploads:
  exports:
  hls:
