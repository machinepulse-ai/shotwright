name: ae-setup-publish

on:
  push:
    paths:
      - setup-versions.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ${{ vars.SHOTWRIGHT_WINDOWS_RUNNER || 'windows-latest-8-cores' }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Load Shotwright config
        id: config
        shell: pwsh
        run: |
          $config = Get-Content -Raw .\shotwright-config.json | ConvertFrom-Json
          "python_version=$($config.tooling.ci.pythonVersion)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "payload_temp_dir_name=$($config.paths.githubRunnerWindows.payloadTempDirName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "setup_build_context_dir_name=$($config.paths.githubRunnerWindows.setupBuildContextDirName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "setup_base_image=$($config.tooling.docker.setupBaseImage)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.config.outputs.python_version }}

      - name: Parse setup versions
        id: versions
        shell: pwsh
        run: |
          $json = python scripts/install/setup_versions.py
          $parsed = $json | ConvertFrom-Json
          "current=$($parsed.current)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "product_id=$($parsed.product_id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "platform=$($parsed.platform)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "payload_dir_name=$($parsed.payload_dir_name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "helper_dir_name=$($parsed.helper_dir_name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ghcr_image=$($parsed.ghcr_image)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Login to GHCR
        shell: pwsh
        run: |
          '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Check if image already exists
        id: check_image
        shell: pwsh
        run: |
          $imageTag = '${{ steps.versions.outputs.ghcr_image }}'
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            Write-Host "Manual dispatch requested — rebuilding and publishing $imageTag from the Adobe payload."
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            return
          }

          $manifest = docker manifest inspect $imageTag 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Image $imageTag already exists in GHCR — skipping build."
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            Write-Host "Image $imageTag not found — will build and publish."
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            $global:LASTEXITCODE = 0
          }

      - name: Download After Effects payload
        if: steps.check_image.outputs.exists != 'true'
        shell: pwsh
        run: |
          $payloadRoot = Join-Path $env:RUNNER_TEMP '${{ steps.config.outputs.payload_temp_dir_name }}'
          python scripts/install/download_after_effects_payload.py `
            --payload-root $payloadRoot `
            --product-id '${{ steps.versions.outputs.product_id }}' `
            --version '${{ steps.versions.outputs.current }}' `
            --platform '${{ steps.versions.outputs.platform }}'
          "PAYLOAD_ROOT=$payloadRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Patch helper Setup.exe
        if: steps.check_image.outputs.exists != 'true'
        shell: pwsh
        run: |
          $platform = '${{ steps.versions.outputs.platform }}'
          $helperSetup = Join-Path $env:PAYLOAD_ROOT "CreativeCloudHelper_${platform}\HDBox\Setup.exe"
          python scripts/install/modify_setup_win.py $helperSetup

      - name: Build setup container image
        if: steps.check_image.outputs.exists != 'true'
        shell: pwsh
        run: |
          $buildContext = Join-Path $env:RUNNER_TEMP '${{ steps.config.outputs.setup_build_context_dir_name }}'
          New-Item -ItemType Directory -Force -Path $buildContext | Out-Null

          $payloadDest = Join-Path $buildContext 'payload'
          New-Item -ItemType Directory -Force -Path $payloadDest | Out-Null
          Copy-Item (Join-Path $env:PAYLOAD_ROOT '${{ steps.versions.outputs.payload_dir_name }}') (Join-Path $payloadDest '${{ steps.versions.outputs.payload_dir_name }}') -Recurse
          Copy-Item (Join-Path $env:PAYLOAD_ROOT '${{ steps.versions.outputs.helper_dir_name }}') (Join-Path $payloadDest '${{ steps.versions.outputs.helper_dir_name }}') -Recurse

          Copy-Item scripts/install/Dockerfile.ae-setup (Join-Path $buildContext 'Dockerfile')

          $imageTag = '${{ steps.versions.outputs.ghcr_image }}'
          docker build `
            --build-arg BASE_IMAGE='${{ steps.config.outputs.setup_base_image }}' `
            --label "org.opencontainers.image.source=https://github.com/${{ github.repository }}" `
            --label "org.opencontainers.image.description=After Effects ${{ steps.versions.outputs.current }} installer payload for Shotwright" `
            -t $imageTag $buildContext

          "IMAGE_TAG=$imageTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Push setup image to GHCR
        if: steps.check_image.outputs.exists != 'true'
        shell: pwsh
        run: |
          docker push $env:IMAGE_TAG
          Write-Host "Published $env:IMAGE_TAG"

      - name: Verify setup image is pullable from GHCR
        if: steps.check_image.outputs.exists == 'true' || env.IMAGE_TAG != ''
        shell: pwsh
        run: |
          docker manifest inspect '${{ steps.versions.outputs.ghcr_image }}'
          if ($LASTEXITCODE -ne 0) {
            throw "Setup image ${{ steps.versions.outputs.ghcr_image }} is not pullable with the workflow GHCR login."
          }
          Write-Host "Verified internal setup image is pullable: ${{ steps.versions.outputs.ghcr_image }}"
