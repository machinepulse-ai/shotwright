name: windows-container-validation

on:
  push:
    paths:
      - setup-versions.yml
      - shotwright-config.json
      - scripts/install/setup_versions.py
      - scripts/shotwright_config.py
      - .github/workflows/windows-container-validation.yml
  pull_request:
    paths:
      - setup-versions.yml
      - shotwright-config.json
      - scripts/install/setup_versions.py
      - scripts/shotwright_config.py
      - .github/workflows/windows-container-validation.yml
  workflow_dispatch:

jobs:
  validate-setup-metadata:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate Shotwright setup metadata
        shell: bash
        run: |
          python3 -m json.tool shotwright-config.json >/dev/null
          python3 scripts/shotwright_config.py --workspace-root "$PWD" --runner-temp "$RUNNER_TEMP" >/tmp/shotwright-config.resolved.json
          python3 scripts/install/setup_versions.py >/tmp/setup-versions.resolved.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          setup = json.loads(Path("/tmp/setup-versions.resolved.json").read_text(encoding="utf-8"))
          config = json.loads(Path("/tmp/shotwright-config.resolved.json").read_text(encoding="utf-8"))

          expected_prefix = "ghcr.io/machinepulse-ai/shotwright/after-effects-setup:"
          if not setup["ghcr_image"].startswith(expected_prefix):
              raise SystemExit(f"Unexpected setup image: {setup['ghcr_image']}")
          if setup["platform"] != "win64":
              raise SystemExit(f"Expected win64 setup platform, got {setup['platform']}")

          docker_config = config["raw"]["tooling"]["docker"]
          for key in ("runtime_base_image", "setup_base_image"):
              image = docker_config[key]
              if "ltsc2025" not in image.lower():
                  raise SystemExit(f"Expected LTSC 2025 base image for {key}, got {image}")

          print(f"Resolved AE setup image: {setup['ghcr_image']}")
          print(f"Runtime base image: {docker_config['runtime_base_image']}")
          print(f"Setup base image: {docker_config['setup_base_image']}")
          PY

      - name: Note full Windows validation path
        shell: bash
        run: |
          echo "PR validation checks setup metadata only."
          echo "Run workflow_dispatch for the full Windows container build and AE render validation."

  full-windows-validation:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.SHOTWRIGHT_WINDOWS_RUNNER || 'windows-latest-8-cores' }}
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect workflow scope
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            dockerfile:
              - 'Dockerfile'
            setup_versions:
              - 'setup-versions.yml'

      - name: Load Shotwright config
        id: config
        shell: pwsh
        run: |
          $config = Get-Content -Raw .\shotwright-config.json | ConvertFrom-Json
          "python_version=$($config.tooling.ci.pythonVersion)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "payload_temp_dir_name=$($config.paths.githubRunnerWindows.payloadTempDirName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "runtime_base_image=$($config.tooling.docker.runtimeBaseImage)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ci_image_tag=$($config.tooling.docker.defaultCiImageTag)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Verify Windows container mode
        shell: pwsh
        run: |
          $osType = docker info --format '{{.OSType}}'
          if ($osType.Trim() -ne 'windows') {
            throw "Expected Docker Windows container mode but got '$osType'."
          }

      - name: Login to GHCR
        shell: pwsh
        run: |
          '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

      - name: Resolve runtime base image
        id: base_image
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.dockerfile == 'true'
        shell: pwsh
        run: |
          $sourceImage = '${{ steps.config.outputs.runtime_base_image }}'
          $sourceTag = $sourceImage.Split(':')[-1]
          $cacheImage = "ghcr.io/machinepulse-ai/shotwright/base_image:$sourceTag"
          $resolvedImage = $sourceImage
          $cacheHit = $false

          Write-Host "Trying GHCR base-image cache: $cacheImage"
          docker pull $cacheImage
          if ($LASTEXITCODE -eq 0) {
            $resolvedImage = $cacheImage
            $cacheHit = $true
            Write-Host "Using cached base image from GHCR: $cacheImage"
          }
          else {
            Write-Host "GHCR base-image cache miss. Pulling source image from MCR: $sourceImage"
            docker pull $sourceImage
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to pull runtime base image from $sourceImage"
            }

            docker tag $sourceImage $cacheImage
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Failed to retag $sourceImage as $cacheImage. Continuing with the MCR image already pulled locally."
              $global:LASTEXITCODE = 0
            }
            else {
              docker push $cacheImage
              if ($LASTEXITCODE -eq 0) {
                $resolvedImage = $cacheImage
                Write-Host "Pushed runtime base-image cache to GHCR: $cacheImage"
              }
              else {
                Write-Warning "Failed to push $cacheImage to GHCR. Continuing with the MCR image already pulled locally."
                $global:LASTEXITCODE = 0
              }
            }
          }

          "resolved_image=$resolvedImage" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Shotwright image
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.dockerfile == 'true'
        shell: pwsh
        run: |
          docker build --build-arg BASE_IMAGE='${{ steps.base_image.outputs.resolved_image }}' -t '${{ steps.config.outputs.ci_image_tag }}' .
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to build the Shotwright image.'
          }

          docker image inspect '${{ steps.config.outputs.ci_image_tag }}' --format '{{.Id}}'

      - uses: actions/setup-node@v4
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.setup_versions == 'true'
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.setup_versions == 'true'
        with:
          python-version: ${{ steps.config.outputs.python_version }}

      - name: Parse setup versions
        id: versions
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.setup_versions == 'true'
        shell: pwsh
        run: |
          $json = python scripts/install/setup_versions.py
          $parsed = $json | ConvertFrom-Json
          "current=$($parsed.current)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "product_id=$($parsed.product_id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "platform=$($parsed.platform)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "payload_dir_name=$($parsed.payload_dir_name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "helper_dir_name=$($parsed.helper_dir_name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ghcr_image=$($parsed.ghcr_image)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Pull setup image from GHCR
        id: setup_image
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.setup_versions == 'true'
        shell: pwsh
        run: |
          docker pull '${{ steps.versions.outputs.ghcr_image }}'
          if ($LASTEXITCODE -eq 0) {
            "available=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            "available=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Warning "Setup image ${{ steps.versions.outputs.ghcr_image }} not available in GHCR. Falling back to local payload download."
            $global:LASTEXITCODE = 0
          }

      - name: Resolve installer payload on runner
        id: payload
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.setup_versions == 'true'
        shell: pwsh
        run: |
          $payloadRoot = Join-Path $env:RUNNER_TEMP '${{ steps.config.outputs.payload_temp_dir_name }}'

          Remove-Item $payloadRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $payloadRoot | Out-Null

          if ('${{ steps.setup_image.outputs.available }}' -eq 'true') {
            docker create --name ae-setup-extract '${{ steps.versions.outputs.ghcr_image }}' cmd /c exit | Out-Null
            try {
              docker cp 'ae-setup-extract:C:\payload\.' $payloadRoot
              if ($LASTEXITCODE -ne 0) {
                throw 'Failed to extract installer payload from the setup image.'
              }
            }
            finally {
              docker rm -f ae-setup-extract | Out-Null
            }
          }
          else {
            python scripts/install/download_after_effects_payload.py `
              --payload-root $payloadRoot `
              --product-id '${{ steps.versions.outputs.product_id }}' `
              --version '${{ steps.versions.outputs.current }}' `
              --platform '${{ steps.versions.outputs.platform }}'
            if ($LASTEXITCODE -ne 0) {
              throw 'Failed to download the installer payload directly on the runner.'
            }
          }

          $helperSetup = Join-Path $payloadRoot (Join-Path '${{ steps.versions.outputs.helper_dir_name }}' 'HDBox\Setup.exe')
          python scripts/install/modify_setup_win.py $helperSetup
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to patch the Creative Cloud helper Setup.exe on the runner.'
          }

          "root=$payloadRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install runner validation tools
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.setup_versions == 'true'
        shell: pwsh
        run: |
          npm install -g @nexrender/cli@1.63.3 @nexrender/action-copy@1.49.4 @nexrender/action-encode@1.46.8
          if ($LASTEXITCODE -ne 0) {
            throw 'Failed to install nexrender tooling on the runner.'
          }

          if (-not (Get-Command ffprobe -ErrorAction SilentlyContinue)) {
            choco install -y --no-progress ffmpeg
            if ($LASTEXITCODE -ne 0) {
              throw 'Failed to install ffmpeg on the runner.'
            }
          }

      - name: Install After Effects and render validation mp4 on runner
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.setup_versions == 'true'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\validate\run_validation_on_runner.ps1 `
            -AfterEffectsPayloadRoot (Join-Path '${{ steps.payload.outputs.root }}' '${{ steps.versions.outputs.payload_dir_name }}') `
            -CreativeCloudHelperRoot (Join-Path '${{ steps.payload.outputs.root }}' '${{ steps.versions.outputs.helper_dir_name }}')

      - name: Validate mp4 with ffprobe on runner
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.setup_versions == 'true'
        shell: pwsh
        run: |
          $outputDir = Join-Path $env:GITHUB_WORKSPACE 'validation-data\output'
          $outputFile = Join-Path $outputDir 'validation.mp4'
          if (-not (Test-Path $outputFile)) {
            throw 'validation.mp4 was not produced.'
          }

          $probeOutput = ffprobe -v error -show_entries format=format_name,duration -of default=noprint_wrappers=1 $outputFile 2>&1
          if ($probeOutput -notmatch 'format_name=.*mp4' -or $probeOutput -notmatch 'duration=') {
            throw "ffprobe did not report a valid mp4 container.`n$probeOutput"
          }